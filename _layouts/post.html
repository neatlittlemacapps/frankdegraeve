<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  {% seo %}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BlogPosting",
    "headline": "{{ page.title | escape }}",
    "description": "{{ page.description | default: page.excerpt | strip_html | normalize_whitespace | truncate: 160 | escape }}",
    "datePublished": "{{ page.date | date_to_xmlschema }}",
    "dateModified": "{{ page.last_modified_at | default: page.date | date_to_xmlschema }}",
    "author": {
      "@type": "Person",
      "name": "{{ site.author.name }}",
      "url": "{{ site.url }}{{ site.baseurl }}/"
    },
    "url": "{{ page.url | absolute_url }}"
  }
  </script>
</head>
<body>
  {% include header.html %}

  <main class="main-content">
    <article class="post">
      <header class="post-header">
        <p class="post-meta">
          <time datetime="{{ page.date | date_to_xmlschema }}">{{ page.date | date: "%B %-d, %Y" }}</time>
          {% if page.category %} &middot; <span class="post-category">{{ page.category }}</span>{% endif %}
        </p>
        <h1 class="post-title">{{ page.title }}</h1>
        {% if page.description %}
        <p class="post-description">{{ page.description }}</p>
        {% endif %}
      </header>

      <div class="post-content">
        {{ content }}
      </div>

      <footer class="post-footer">
        <a href="{{ '/blog/' | relative_url }}" class="back-link">&larr; Back to Blog</a>
      </footer>
    </article>
  </main>

  {% include footer.html %}

  <script src="{{ '/assets/js/tabs.js' | relative_url }}"></script>
</body>
</html>
