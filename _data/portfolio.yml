- title: DELA
  slug: dela
  byline: 300% Conversion rate increase by fundamentally rethinking online intake.
  tags:
  - Conversion optimisation
  - Interaction design
  - UX Design
  challenge: The company's online insurance quote request form had a low conversion rate due to too many barriers.
  approach: I conducted user research and workshops with stakeholders to simplify the process and reduce cognitive load. I considerably grew the number of steps but I lowered the cognitive load for each step. To mitigate the growth in steps I defined smart pre and post flow actions and I introduced motion design to induce a perceived sense of speed for the user.
  outcome: The conversion rate improved by 300% on mobile and 211% on desktop, exceeding the estimated 30% improvement.
