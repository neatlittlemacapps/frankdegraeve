- title: BARRY CALLEBAUT
  slug: barry-callebaut
  byline: Unified international multi-brand multi-product online platform
  tags:
  - Information Architecture
  - Prototyping
  - Site concept and definition
  challenge: The company needed to consolidate up to 20 different brands, serving different regions and industries, into one complex website. A key part of this challenge was tailoring the product offering and content to three core industries and their target audiences, ensuring that product classes (e.g., liquid chocolate) were not mixed up with classes intended for a different audience (e.g., chocolate in bags).
  approach: I conducted stakeholder interviews, workshops, and customer journey mapping. To address the challenge of separating product offerings, I created a **smart information architecture** that logically separated the products and content for each industry. This architecture also included pathways for audiences to easily explore other industries if they desired. I then co-created a prototype with user testing to validate this approach.
  outcome: The new information architecture was successfully implemented, which directly addressed the complex product and content segmentation.
