  challenge: The company needed a clear, usable, and supported digital communication strategy for its complex ecosystem of over 40 brands.
  approach: I facilitated the definition of a new vision, mission, and strategic goals that were supported by all stakeholders. I achieved this by, amongst other techniques and initiatives, applying the **LEGO Serious Play facilitation technique**, which I am certified in. This resulted in simple guiding principles and a framework for continuous adaptation of the ever changing landscape at Colruyt.
  outcome: The strategy is now clear and supported by all stakeholders. The new framework allows employees to take action and understand what content to create, for whom, and where it should live in the digital ecosystem, enabling them to adjust their approach in real-time in line with any new changes that might arise. This framework is not only a deliverable but a functional tool that lives in the day to day workings.
