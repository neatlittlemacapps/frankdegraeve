  challenge: To create a new international website that would cater to a wide range of customers with a broad product offering.
  approach: I held on-site workshops and conducted customer interviews to understand the business, products, and customer segments. I also performed customer journey mapping, service blueprinting, and a Jobs to Be Done workshop to define and prioritize solutions. Finally, I performed user testing on prototypes and collaborated on the final designs.
  outcome: The new information architecture was successfully implemented, catering to multiple segments, including architects, engineers, and end-customers. The smart information architecture provides a solid platform that enables a solid content strategy. All content is intuitively findable and interconnected resulting in a contextually relevant experience.
