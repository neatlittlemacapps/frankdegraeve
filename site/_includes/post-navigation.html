<div class="post__navigation animate">
  {% if page.previous.url %}
  <a class="post__prev" href="{{ page.previous.url | relative_url }}">
    <div class="prev__image">
      <img loading="lazy" src="{{ page.previous.image | relative_url }}" alt="{{ page.title }}">
    </div>
    <div class="prev__box">
      <span class="post__nav post__nav__prev">Prev post</span>
      <h2 class="post__nav__title">{{page.previous.title}}</h2>
    </div>
  </a>
  {% endif %}

  {% if page.next.url %}
  <a class="post__next" href="{{ page.next.url | relative_url }}">
    <div class="next__box">
      <span class="post__nav post__nav__next">Next post</span>
      <h2 class="post__nav__title">{{page.next.title}}</h2>
    </div>
    <div class="next__image">
      <img loading="lazy" src="{{ page.next.image | relative_url }}" alt="{{ page.title }}">
    </div>
  </a>
  {% endif %}
</div>
