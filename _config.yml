title: Frank De Graeve
email: frank.de.graeve@neatlittlemacapps.com
description: >-
  Personal website of Frank — I build systems, not screens · DesignOps · UX Strategy · AI Adoption | Helping teams build the conditions to scale design impact and AI fluency.
baseurl: "/neatlittlemacapps-blog"
url: "https://neatlittlemacapps.github.io"

# Author info — used in JSON-LD Person schema and jekyll-seo-tag
author:
  name:     "Frank De Graeve"
  email:    "frank.de.graeve@neatlittlemacapps.com"
  twitter:  "neatlittlemacapps"
  github:   "neatlittlemacapps"
  linkedin: "frankdegraeve"

# Build settings
markdown: kramdown
highlighter: rouge

plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Post and page defaults
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "default"

# Post URLs — always under /blog/ regardless of category
permalink: /blog/:year/:month/:day/:title/

# Feed config
feed:
  path: feed.xml

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - source-data/
  - _tools/
  - vendor/
